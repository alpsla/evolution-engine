[project]
name = "evolution-engine"
version = "0.1.0"
description = "Git-native codebase evolution indexer"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
  { name = "Slava" }
]

dependencies = [
  "GitPython>=3.1"
]

[project.scripts]
evolution = "evolution.cli:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"
