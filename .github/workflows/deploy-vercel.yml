name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'website/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Copy website to a clean directory (no .git) to avoid
          # Vercel's git author team membership check
          tmp=$(mktemp -d)
          mkdir -p "$tmp/website"
          cp -r website/* "$tmp/website/"
          rm -rf "$tmp/website/__pycache__" "$tmp/website/api/__pycache__"
          cd "$tmp"
          vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
